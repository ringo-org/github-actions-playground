name: Validate Texture

on:
    pull_request:
        branches:
            - main
            - develop
jobs:
    texture:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0
            - run: npm ci
            - run: npm run validate:texture
              env:
                  CHANGED_FILES: ${{ env.CHANGED_FILES }}
