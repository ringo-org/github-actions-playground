name: lint code

on:
  pull_request:
    branches: 
      - main

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Fetch main branch
        run: git fetch origin main

      - name: Get changed files
        id: changed-files
        run: |
          echo "files<<EOF" >> $GITHUB_OUTPUT
          git diff --name-only --diff-filter=ACMR origin/main...HEAD >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Debug changed files
        run: |
          echo "===== CHANGED FILES ====="
          echo "${{ steps.changed-files.outputs.files }}"
          echo "========================="

      - name: Run ESLint on changed lines only
        env:
          CHANGED_FILES: ${{ steps.changed-files.outputs.files }}
        run: |
          FILES=$(echo "$CHANGED_FILES" | grep '^assets/scripts/.*\.ts$' || true)
          if [ -z "$FILES" ]; then
            echo "No TS files changed"
            exit 0
          fi

          FAILED=0
          for FILE in $FILES; do
            echo "Checking $FILE"

            git diff -U0 origin/main...HEAD -- "$FILE" \
              | grep '^@@' \
              | sed -E 's/^@@ .*\+([0-9]+)(,([0-9]+))? @@.*$/\1 \3/' \
              | awk '{
                  start=$1; count=$2;
                  if (count == "") count=1;
                  for (i=0; i<count; i++) print start+i;
                }' > changed-lines.txt

            if [ ! -s changed-lines.txt ]; then
              echo "No changed lines in $FILE, skipping"
              continue
            fi

            npx eslint -f json "$FILE" > eslint-output.json || true

            node -e "
              const fs = require('fs');
              const report = JSON.parse(fs.readFileSync('eslint-output.json', 'utf8'));
              const changedLines = new Set(
                fs.readFileSync('changed-lines.txt', 'utf8')
                  .split('\n').filter(Boolean).map(Number)
              );
              let failed = false;
              for (const file of report) {
                for (const msg of file.messages) {
                  if (changedLines.has(msg.line)) {
                    const level = msg.severity === 2 ? 'error' : 'warning';
                    console.error(\`[\${level}] \${file.filePath}:\${msg.line}:\${msg.column} \${msg.message} (\${msg.ruleId})\`);
                    if (msg.severity === 2) failed = true;
                  }
                }
              }
              if (failed) process.exit(1);
            " || FAILED=1
          done

          rm -f changed-lines.txt eslint-output.json

          if [ "$FAILED" -eq 1 ]; then
            exit 1
          fi