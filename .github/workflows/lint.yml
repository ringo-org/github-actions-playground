name: lint code

on:
  pull_request:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Setup reviewdog
        uses: reviewdog/action-setup@v1
        with:
          reviewdog_version: latest

      - name: Get changed TS files
        id: changed-files
        run: |
          FILES=$(git diff --name-only --diff-filter=ACMR origin/main...HEAD \
            | grep '^assets/scripts/.*\.ts$' || true)
          echo "files=$FILES" >> $GITHUB_OUTPUT

      - name: Debug changed files
        run: |
          echo "===== CHANGED FILES ====="
          echo "${{ steps.changed-files.outputs.files }}"
          echo "========================="

      - name: Run ESLint via reviewdog
        if: steps.changed-files.outputs.files != ''
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CHANGED_FILES: ${{ steps.changed-files.outputs.files }}
        run: |
          npx eslint --format checkstyle $CHANGED_FILES \
            | reviewdog -f=checkstyle \
                -name="eslint" \
                -reporter=github-pr-review \
                -filter-mode=diff_context \
                -fail-on-error=true \
                -level=warning

      - name: No TS files changed
        if: steps.changed-files.outputs.files == ''
        run: echo "No TS files changed, skipping lint"
