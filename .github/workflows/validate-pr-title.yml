name: Validate PR Title

on:
    pull_request:
        branches:
            - main
            - develop
        types:
            - opened
            - edited
            - synchronize

jobs:
    pr-title:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - run: npm ci
            - run: npm run validate:pr-title
              env:
                  PR_TITLE: ${{ github.event.pull_request.title }}
